apiVersion: apps/v1
kind: Deployment
metadata:
  name: forge-gateway
  namespace: forge
  labels:
    app: forge-gateway
spec:
  replicas: 2
  selector:
    matchLabels:
      app: forge-gateway
  template:
    metadata:
      labels:
        app: forge-gateway
    spec:
      containers:
        - name: gateway
          image: forge-gateway:0.1.0
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: forge-gateway-config
            - secretRef:
                name: forge-gateway-secrets
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              # Presidio's NER model is the memory floor (ADR-0007)
              memory: 1Gi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            runAsNonRoot: true
            runAsUser: 10001
