# Copy to secret.yaml (gitignored), fill in real values, then:
#   kubectl apply -f secret.yaml
# Production deployments should use external secret management
# (ESO, sealed-secrets, vault) instead — this is the dev-cluster shape.
apiVersion: v1
kind: Secret
metadata:
  name: forge-gateway-secrets
  namespace: forge
type: Opaque
stringData:
  FORGE_MASTER_KEY: "change-me"
  FORGE_DATABASE_URL: "postgresql+asyncpg://forge:forge@forge-postgres:5432/forge"
  OPENAI_API_KEY: ""
  ANTHROPIC_API_KEY: ""
